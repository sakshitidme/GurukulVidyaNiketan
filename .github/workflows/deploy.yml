name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ----- FRONTEND -----
      - name: FrontEnd - Install Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: FrontEnd - Build
        working-directory: ./frontend
        run: npm run build

      # ----- BACKEND -----
      # We don't strictly need to build the backend on CI, but we can install dependencies to ensure no lockfile issues
      # The actual PM2 restart happens on the VPS directly

      # ----- DEPLOY VIA SCP -----
      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          # Exclude heavy folders, move dist and backend
          source: "frontend/dist/,backend/,package.json,README.md"
          target: "/var/www/html/my-project"
          strip_components: 0

      # ----- SCRIPT EXECUTION ON VPS -----
      - name: Execute Server Scripts via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            # Navigate to the backend directory on your Hostinger VPS
            cd /var/www/html/my-project/backend
            
            # Install backend production dependencies safely
            npm install --production --legacy-peer-deps
            
            # Restart or start the PM2 server
            pm2 restart backend || pm2 start server.js --name backend
            
            # If using PM2 for a specific Next/Nuxt or serving static via express etc.
            pm2 save
